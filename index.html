<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aurélien Laporte — Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
--navy:#08121d;
--gold:#c9a84c;
--white:#fff;
--gray:#6b7d8e;
--cream:#f7f3ed;
}

body{
font-family:'DM Sans',sans-serif;
background:var(--cream);
color:#0f1e2e;
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
padding:20px 60px;
display:flex;
justify-content:space-between;
z-index:1000;
background:rgba(8,18,29,0.9);
}

.nav-logo{
color:white;
font-family:'Cormorant Garamond',serif;
font-size:1.4rem;
text-decoration:none;
}

.nav-logo em{color:var(--gold);font-style:normal}

/* HERO */
#hero{
min-height:100vh;
display:grid;
grid-template-columns:1fr 1fr;
background:var(--navy);
}

.hero-left{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:120px 40px;
}

.hero-name{
font-size:4rem;
color:white;
font-family:'Cormorant Garamond',serif;
}

.hero-name em{
color:var(--gold);
display:block;
}

.hero-title{
color:#9cb0c8;
margin:20px 0;
}

.hero-desc{
color:#8aa0b8;
max-width:400px;
margin-bottom:30px;
}

.btn{
padding:12px 25px;
text-decoration:none;
margin:5px;
font-size:0.8rem;
letter-spacing:2px;
}

.btn-outline{
border:1px solid var(--gold);
color:var(--gold);
}

.btn-solid{
background:var(--gold);
color:black;
}

/* IMAGE */
.hero-right{
display:flex;
justify-content:center;
align-items:center;
}

.hero-photo{
width:320px;
height:420px;
object-fit:cover;
object-position:center 20%;
border-radius:6px;
filter:grayscale(10%) contrast(1.05);
transition:.4s;
}

.hero-photo:hover{
transform:scale(1.03);
filter:none;
}

/* CONTACT */
#contact{
background:var(--navy);
color:white;
padding:80px;
}

input, textarea{
width:100%;
padding:12px;
margin-bottom:15px;
background:#1a3554;
border:none;
color:white;
}

button{
padding:12px 25px;
background:var(--gold);
border:none;
cursor:pointer;
}

/* RESPONSIVE */
@media(max-width:768px){
#hero{grid-template-columns:1fr}
.hero-right{display:none}
}
</style>
</head>

<body>

<nav>
<a href="#" class="nav-logo">Aurélien <em>L.</em></a>
</nav>

<section id="hero">

<div class="hero-left">
<h1 class="hero-name">Aurélien <em>Laporte</em></h1>

<p class="hero-title">
Étudiant DCG — Futur alternant DSCG
</p>

<p class="hero-desc">
Passionné par la comptabilité, la gestion et la fiscalité.
</p>

<div>
<a href="#contact" class="btn btn-solid">Contact</a>
<a href="#" class="btn btn-outline">CV</a>
</div>
</div>

<div class="hero-right">
<img src="IMG_4833.JPG" alt="Photo Aurélien" class="hero-photo">
</div>

</section>

<section id="contact">
<h2>Contact</h2>

<form id="contactForm" action="https://formspree.io/f/mrejpown" method="POST">

<input type="text" name="prenom" placeholder="Prénom" required>
<input type="text" name="nom" placeholder="Nom" required>
<input type="email" name="email" placeholder="Email" required>
<textarea name="message" placeholder="Message" required></textarea>

<button type="submit" id="submitBtn">Envoyer</button>

</form>
</section>

<script>
document.getElementById("contactForm").addEventListener("submit",async function(e){
e.preventDefault();
let btn=document.getElementById("submitBtn");
btn.innerText="Envoi...";
btn.disabled=true;

let res=await fetch(this.action,{
method:"POST",
body:new FormData(this),
headers:{Accept:"application/json"}
});

if(res.ok){
btn.innerText="Envoyé ✓";
this.reset();
}else{
btn.innerText="Erreur";
}

setTimeout(()=>{
btn.innerText="Envoyer";
btn.disabled=false;
},4000);
});
</script>

</body>
</html>
